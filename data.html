<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabel Data Layanan</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="navbar">
    <h1>Sistem Layanan Mahasiswa</h1>
    <nav>
      <a href="index.html">Form Input</a>
      <a href="data.html" class="active">Tabel Data</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <div class="table-header">
        <h2>Tabel Data Layanan</h2>
        <button id="btnHapusSemua" class="btn-danger">Hapus Semua Data</button>
      </div>

      <div class="table-wrapper">
        <table id="tabelData">
          <thead>
            <tr>
              <th>No</th>
              <th>Nama</th>
              <th>NIM</th>
              <th>Jenis Layanan</th>
              <th>Keterangan</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tabelBody">
          </tbody>
        </table>
      </div>

      <p id="emptyMsg" class="status-msg" style="display:none;">Belum ada data yang diinput.</p>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Sistem Layanan Mahasiswa - Tugas SUB-CPMK-07-2-8</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
