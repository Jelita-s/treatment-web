<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Input Data Layanan</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="navbar">
    <h1>Sistem Layanan Mahasiswa</h1>
    <nav>
      <a href="index.html" class="active">Form Input</a>
      <a href="data.html">Tabel Data</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h2>Form Input Data</h2>
      <form id="formInput">
        <div class="form-group">
          <label for="nama">Nama</label>
          <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" required>
        </div>

        <div class="form-group">
          <label for="nim">NIM</label>
          <input type="text" id="nim" name="nim" placeholder="Masukkan NIM" required>
        </div>

        <div class="form-group">
          <label for="jenisLayanan">Jenis Layanan</label>
          <select id="jenisLayanan" name="jenisLayanan" required>
            <option value="" disabled selected>Pilih jenis layanan</option>
            <option value="Surat Keterangan Aktif Kuliah">Surat Keterangan Aktif Kuliah</option>
            <option value="Legalisir Ijazah">Legalisir Ijazah</option>
            <option value="Surat Rekomendasi">Surat Rekomendasi</option>
            <option value="Konsultasi Akademik">Konsultasi Akademik</option>
            <option value="Lainnya">Lainnya</option>
          </select>
        </div>

        <div class="form-group">
          <label for="keterangan">Keterangan</label>
          <textarea id="keterangan" name="keterangan" rows="4" placeholder="Tambahkan keterangan (opsional)"></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary">Simpan Data</button>
          <button type="reset" class="btn-secondary">Reset</button>
        </div>
      </form>

      <p id="statusMsg" class="status-msg"></p>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Sistem Layanan Mahasiswa - Tugas SUB-CPMK-07-2-8</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
